<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Graph Algorithm Visualizer</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        h1{
            margin-top: 10px;
        }

        .toolbar{
            margin: 15px;
        }

        button{
            padding: 10px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        .layout{
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .leftPanel{
            width: 300px;
            margin-right: 20px;
        }

        #codeBox{
            background: white;
            border: 1px solid #333;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            text-align: left;
        }

        #dataBox{
            border: 1px solid #333;
            background: white;
            padding: 10px;
            height: 60px;
            margin-top: 10px;
        }

        canvas{
            border: 2px solid black;
            background: white;
        }
    </style>

</head>

<body>

<h1>Graph Algorithm Visualizer</h1>

<!-- TOOLBAR -->
<div class="toolbar">

    <button onclick="setMode('node')">Add Node</button>
    <button onclick="setMode('edge')">Add Edge</button>

    <button onclick="runBFS()">Run BFS</button>
    <button onclick="runDFS()">Run DFS</button>
    <button onclick="runDijkstra()">Run Dijkstra</button>

    <button onclick="clearGraph()">Clear</button>

</div>

<div class="layout">

    <!-- LEFT PANEL -->
    <div class="leftPanel">

        <h3>Pseudocode</h3>
        <pre id="codeBox"></pre>

        <h3>Queue / Stack / Data</h3>
        <div id="dataBox"></div>

    </div>

    <!-- CANVAS -->
    <canvas id="canvas" width="900" height="550"></canvas>

</div>

<!-- SCRIPT -->
<script src="/static/graph.js"></script>
<script src="/static/bfs.js"></script>
<script src="/static/dfs.js"></script>
<script src="/static/dijkstra.js"></script>

<script>
    // UI helpers
    function updateData(data){
        document.getElementById("dataBox").innerText = data;
    }

    function showCode(code){
        document.getElementById("codeBox").innerText = code;
    }

    // đảm bảo vẽ lần đầu
    window.onload = function(){
        if(typeof draw === "function"){
            draw();
        }
    }
</script>

</body>
</html>
