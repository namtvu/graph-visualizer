<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Graph Visualizer 2025-2026</title>

<style>
body{font-family:Arial;text-align:center;background:#f2f2f2;}
.toolbar button{margin:5px;padding:10px;border:none;background:#3498db;color:white;border-radius:6px;}
.toolbar button:hover{background:#2980b9;}
.layout{display:flex;justify-content:center;margin-top:10px;}
.panel{width:320px;margin-right:15px;}
#codeBox,#dataBox,#resultBox{
    background:white;border:1px solid #333;
    padding:10px;margin-top:10px;text-align:left;
}
#resultBox{border:2px solid red;font-weight:bold;}
canvas{border:2px solid black;background:white;}
</style>
</head>

<body>

<h2>Graph Visualizer DA24TT (2025-2026)</h2>

<div class="toolbar">
<button onclick="setMode('node')">Add Node</button>
<button onclick="setMode('edge')">Add Edge</button>
<button onclick="setMode('move')">Move</button>
<button onclick="runBFS()">BFS</button>
<button onclick="runDFS()">DFS</button>
<button onclick="setStart()">Set Start</button>
<button onclick="runDijkstraAll()">Dijkstra All</button>
<button onclick="setEnd()">Set End</button>
<button onclick="runDijkstraXY()">Dijkstra x→y</button>
<button onclick="clearGraph()">Clear</button>
</div>

<div class="layout">

<div class="panel">
<h3>Pseudocode</h3>
<pre id="codeBox"></pre>

<h3>Process</h3>
<div id="dataBox"></div>

<h3>Result</h3>
<div id="resultBox"></div>
</div>

<canvas id="canvas" width="900" height="550"></canvas>

</div>

<script src="/static/graph.js"></script>
<script src="/static/bfs.js"></script>
<script src="/static/dfs.js"></script>
<script src="/static/dijkstra.js"></script>

<script>
function updateData(d){document.getElementById("dataBox").innerText=d;}
function showCode(c){document.getElementById("codeBox").innerText=c;}
function showResult(r){document.getElementById("resultBox").innerText=r;}
</script>

</body>
</html>
