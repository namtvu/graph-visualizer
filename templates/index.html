<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Graph Visualizer</title>

<style>
body{font-family:Arial;text-align:center;background:#f2f2f2;}
.toolbar button{padding:10px;margin:5px;}
.layout{display:flex;justify-content:center;}
#codeBox,#dataBox{background:white;border:1px solid #333;padding:10px;margin:5px;}
canvas{border:2px solid black;background:white;}
</style>

</head>

<body>

<h2>Graph Algorithm Visualizer</h2>

<div class="toolbar">
<button onclick="setMode('node')">Add Node</button>
<button onclick="setMode('edge')">Add Edge</button>
<button onclick="runBFS()">BFS</button>
<button onclick="runDFS()">DFS</button>
<button onclick="runDijkstra()">Dijkstra</button>
<button onclick="clearGraph()">Clear</button>
</div>

<div class="layout">
<div>
<h3>Pseudocode</h3>
<pre id="codeBox"></pre>

<h3>Data</h3>
<div id="dataBox"></div>
</div>

<canvas id="canvas" width="800" height="500"></canvas>
</div>

<script src="/static/graph.js"></script>
<script src="/static/bfs.js"></script>
<script src="/static/dfs.js"></script>
<script src="/static/dijkstra.js"></script>

<script>
function updateData(data){
    document.getElementById("dataBox").innerText = data;
}

function showCode(code){
    document.getElementById("codeBox").innerText = code;
}
</script>

</body>
</html>
